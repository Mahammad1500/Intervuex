<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/IntervuexLogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Intervuex — Automated Interview Scheduling Platform. Schedule interviews in seconds with AI-powered conflict detection and real meeting links." />
    <meta name="theme-color" content="#6366f1" />
    <title>Intervuex — Automated Interview Scheduling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('intervuex-theme');
          if (!raw) return;
          var theme = JSON.parse(raw).state && JSON.parse(raw).state.theme;
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
